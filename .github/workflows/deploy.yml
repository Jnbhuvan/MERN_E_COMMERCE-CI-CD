name: MERN CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Get your code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build & Push Backend Image
      - name: Build and Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest

      # 4. Build & Push Frontend Image
      - name: Build and Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest

      # 5. Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/MERN_E_COMMERCE-CI-CD

            echo "Pulling latest images..."
            docker compose pull

            echo "Restarting containers..."
            docker compose down
            docker compose up -d

            echo "Cleaning old images..."
            docker image prune -f
