services:
  frontend:
    build: ./frontend
    expose:
      - "5173"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend

  backend:
    build: ./backend
    expose:
      - "5000"
    env_file:
      - ./backend/.env

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
