services:
  frontend:
    # build: ./frontend
    image: bhvnjn/mern-frontend:latest
    container_name: frontend
    expose:
      - "5173"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    restart: always
    networks:
      - app-network

  backend:
    #build: ./backend
    image: bhvnjn/mern-backend:latest
    container_name: backend
    expose:
      - "5000"
    env_file:
      - ./backend/.env
    restart: always
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: always
    networks:
      - app-network

networks:
  app-network:
